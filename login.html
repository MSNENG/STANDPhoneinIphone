<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="result"></p>

<a href="signup.html">Create Account</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7mw9sRiDIqQVVoiFJGY8PcfNWz0kfGpQ",
  authDomain: "phoneinipone.firebaseapp.com",
  projectId: "phoneinipone",
  storageBucket: "phoneinipone.firebasestorage.app",
  messagingSenderId: "57581989221",
  appId: "1:57581989221:web:7846f8c2c034af9774c58c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch((error) => {
      document.getElementById("result").innerText = error.message;
    });

};

</script>

</body>
</html>
