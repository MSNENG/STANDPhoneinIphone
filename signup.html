<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
</head>
<body>

<h2>Create Account</h2>

<input type="text" id="username" placeholder="Username"><br><br>

<input type="text" id="phone" placeholder="05XXXXXXXX"><br><br>

<input type="email" id="email" placeholder="Email"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>

<input type="password" id="confirmPassword" placeholder="Confirm Password"><br><br>

<button onclick="signup()">Create Account</button>

<p id="result"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7mw9sRiDIqQVVoiFJGY8PcfNWz0kfGpQ",
  authDomain: "phoneinipone.firebaseapp.com",
  projectId: "phoneinipone",
  storageBucket: "phoneinipone.firebasestorage.app",
  messagingSenderId: "57581989221",
  appId: "1:57581989221:web:7846f8c2c034af9774c58c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function () {

  const username = document.getElementById("username").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const result = document.getElementById("result");

  if (!username) {
    result.innerText = "Please enter username";
    return;
  }

  if (!/^05\d{8}$/.test(phone)) {
    result.innerText = "Phone must start with 05 and be 10 digits";
    return;
  }

  if (password.length < 6) {
    result.innerText = "Password must be at least 6 characters";
    return;
  }

  if (password !== confirmPassword) {
    result.innerText = "Passwords do not match";
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(auth, email, password);

    await updateProfile(userCredential.user, {
      displayName: username
    });

    result.innerText = "Account created successfully";

    // حل مشكلة الانتقال في GitHub Pages
    await new Promise(resolve => setTimeout(resolve, 800));

    window.location.replace("login.html");

  } catch (error) {
    result.innerText = error.message;
  }

};

</script>

</body>
</html>
