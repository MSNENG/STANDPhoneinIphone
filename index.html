<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Page</title>
</head>
<body>

<h2>Main Page</h2>

<p id="welcome"></p>

<input type="text" id="seriesName" placeholder="اسم المسلسل"><br><br>

<select id="episode">
  <option value="">اختر الحلقة</option>
</select><br><br>

<input type="number" id="season" placeholder="الموسم"><br><br>

<textarea id="notes" maxlength="250" placeholder="ملاحظات (حد أقصى 250 حرف)"></textarea><br><br>

<button id="saveBtn">حفظ البيانات</button>
<button id="logoutBtn">تسجيل خروج</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged,
  signOut 
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import { 
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7mw9sRiDIqQVVoiFJGY8PcfNWz0kfGpQ",
  authDomain: "phoneinipone.firebaseapp.com",
  projectId: "phoneinipone",
  storageBucket: "phoneinipone.firebasestorage.app",
  messagingSenderId: "57581989221",
  appId: "1:57581989221:web:7846f8c2c034af9774c58c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// تعبئة الحلقات 1 إلى 100
const episodeSelect = document.getElementById("episode");
for (let i = 1; i <= 100; i++) {
  let opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  episodeSelect.appendChild(opt);
}

// التأكد من تسجيل الدخول
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  document.getElementById("welcome").innerText =
    "Welcome " + (user.displayName || user.email);

  // جلب البيانات من Firestore
  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    document.getElementById("seriesName").value = data.seriesName || "";
    document.getElementById("episode").value = data.episode || "";
    document.getElementById("season").value = data.season || "";
    document.getElementById("notes").value = data.notes || "";
  }
});

// حفظ البيانات
document.getElementById("saveBtn").addEventListener("click", async () => {

  const seriesName = document.getElementById("seriesName").value.trim();
  const episode = document.getElementById("episode").value;
  const season = document.getElementById("season").value;
  const notes = document.getElementById("notes").value;

  if (!seriesName) {
    document.getElementById("status").innerText = "اسم المسلسل مطلوب";
    return;
  }

  if (!episode) {
    document.getElementById("status").innerText = "اختر الحلقة";
    return;
  }

  if (!season) {
    document.getElementById("status").innerText = "الموسم مطلوب";
    return;
  }

  try {
    await setDoc(doc(db, "users", currentUser.uid), {
      seriesName,
      episode,
      season,
      notes
    });

    document.getElementById("status").innerText = "تم الحفظ بنجاح";

  } catch (error) {
    document.getElementById("status").innerText = error.message;
  }
});

// تسجيل خروج
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

</script>

</body>
</html>
